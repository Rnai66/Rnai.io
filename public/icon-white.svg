<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- White icon for dark backgrounds -->
  <!-- Outer circle ring -->
  <circle cx="128" cy="128" r="116" fill="none" stroke="white" stroke-width="4"/>

  <!-- Inner background -->
  <circle cx="128" cy="128" r="96" fill="white" opacity="0.08"/>

  <!-- Center node -->
  <circle cx="128" cy="128" r="16" fill="white"/>

  <!-- Surrounding nodes -->
  <circle cx="128" cy="50" r="10" fill="white" opacity="0.8"/>
  <circle cx="128" cy="206" r="10" fill="white" opacity="0.8"/>
  <circle cx="50" cy="128" r="10" fill="white" opacity="0.8"/>
  <circle cx="206" cy="128" r="10" fill="white" opacity="0.8"/>

  <!-- Diagonal nodes -->
  <circle cx="164" cy="76" r="10" fill="white" opacity="0.6"/>
  <circle cx="164" cy="180" r="10" fill="white" opacity="0.6"/>
  <circle cx="92" cy="76" r="10" fill="white" opacity="0.6"/>
  <circle cx="92" cy="180" r="10" fill="white" opacity="0.6"/>

  <!-- Connection lines -->
  <line x1="128" y1="50" x2="128" y2="104" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="128" y1="152" x2="128" y2="206" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="50" y1="128" x2="104" y2="128" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="152" y1="128" x2="206" y2="128" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="92" y1="76" x2="104" y2="104" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="152" y1="152" x2="164" y2="180" stroke="white" stroke-width="3" opacity="0.5"/>
</svg>